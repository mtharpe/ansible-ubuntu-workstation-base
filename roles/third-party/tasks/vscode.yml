---
- name: Probe VSCode apt repo
  ansible.builtin.uri:
    url: https://packages.microsoft.com/repos/code/dists/stable/Release
    method: HEAD
    status_code: [200, 301, 302]
  register: vscode_probe
  failed_when: false
  changed_when: false
  tags: [third_party, vscode]

- name: Note unreachable VSCode repo
  ansible.builtin.debug:
    msg: "VSCode apt repo unreachable — skipping."
  when: vscode_probe.status | default(0) != 200
  tags: [third_party, vscode]

- name: Check for VSCode repo
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/vscode.list
  register: ubuntu_vscode_installed
  when: vscode_probe.status | default(0) == 200
  tags: [third_party, vscode]

- name: Fetch Microsoft (VSCode) signing key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /tmp/microsoft-keyring.asc
    mode: '0644'
    force: false
  become: true
  when: vscode_probe.status | default(0) == 200
  tags: [third_party, vscode]

- name: Install Microsoft (VSCode) signing key (dearmored)
  ansible.builtin.shell:
    cmd: gpg --dearmor < /tmp/microsoft-keyring.asc > /usr/share/keyrings/microsoft-keyring.gpg
    creates: /usr/share/keyrings/microsoft-keyring.gpg
  become: true
  when: vscode_probe.status | default(0) == 200
  tags: [third_party, vscode]

- name: Add VSCode repo
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-keyring.gpg]
      https://packages.microsoft.com/repos/code stable main"
    state: present
    filename: vscode
    update_cache: false
  when:
    - vscode_probe.status | default(0) == 200
    - not (ubuntu_vscode_installed.stat.exists | default(false))
  become: true
  register: vscode_repo_added
  tags: [third_party, vscode]

- name: Refresh apt cache after adding VSCode repo  # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  become: true
  when: vscode_repo_added is changed
  changed_when: false
  tags: [third_party, vscode]

- name: Install VSCode
  ansible.builtin.apt:
    name: code
    state: present
    cache_valid_time: 3600
  become: true
  when: vscode_probe.status | default(0) == 200
  tags: [third_party, vscode]
