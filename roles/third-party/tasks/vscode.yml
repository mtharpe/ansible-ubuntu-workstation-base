---
- name: Probe VSCode apt repo
  ansible.builtin.uri:
    url: https://packages.microsoft.com/repos/code/dists/stable/Release
    method: HEAD
    status_code: [200, 301, 302]
  register: vscode_probe
  failed_when: false
  changed_when: false
  tags: [third_party, vscode]

- name: Note unreachable VSCode repo
  ansible.builtin.debug:
    msg: "VSCode apt repo unreachable — skipping."
  when: vscode_probe.status | default(0) != 200
  tags: [third_party, vscode]

# The `code` deb package's postinst writes /etc/apt/sources.list.d/vscode.sources
# (deb822) with Signed-By=/usr/share/keyrings/microsoft.gpg. To avoid an apt
# "conflicting values set for option Signed-By" error, we write the same file
# with the same keyring path before installing — the postinst then overwrites
# it with identical content. Any legacy vscode.list / microsoft-keyring.gpg
# from older runs of this role is removed.
- name: Remove legacy VSCode source list (replaced by vscode.sources)
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/vscode.list
    state: absent
  become: true
  when: vscode_probe.status | default(0) == 200
  tags: [third_party, vscode]

- name: Remove legacy Microsoft keyring (replaced by microsoft.gpg)
  ansible.builtin.file:
    path: /usr/share/keyrings/microsoft-keyring.gpg
    state: absent
  become: true
  when: vscode_probe.status | default(0) == 200
  tags: [third_party, vscode]

- name: Fetch Microsoft (VSCode) signing key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /tmp/microsoft-keyring.asc
    mode: '0644'
    force: false
  become: true
  when: vscode_probe.status | default(0) == 200
  tags: [third_party, vscode]

- name: Install Microsoft (VSCode) signing key (dearmored)
  ansible.builtin.shell:
    cmd: gpg --dearmor < /tmp/microsoft-keyring.asc > /usr/share/keyrings/microsoft.gpg
    creates: /usr/share/keyrings/microsoft.gpg
  become: true
  when: vscode_probe.status | default(0) == 200
  tags: [third_party, vscode]

- name: Add VSCode repo (deb822, matches `code` postinst output)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/vscode.sources
    content: |
      Types: deb
      URIs: https://packages.microsoft.com/repos/code
      Suites: stable
      Components: main
      Architectures: amd64,arm64,armhf
      Signed-By: /usr/share/keyrings/microsoft.gpg
    owner: root
    group: root
    mode: '0644'
  become: true
  when: vscode_probe.status | default(0) == 200
  register: vscode_repo_added
  tags: [third_party, vscode]

- name: Refresh apt cache after adding VSCode repo  # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  become: true
  when: vscode_repo_added is changed
  changed_when: false
  tags: [third_party, vscode]

- name: Install VSCode
  ansible.builtin.apt:
    name: code
    state: present
    cache_valid_time: 3600
  become: true
  when: vscode_probe.status | default(0) == 200
  tags: [third_party, vscode]
