---
- name: Apt key for VSCode
  ansible.builtin.apt_key:
    url: https://packages.microsoft.com/keys/microsoft.asc
    state: present
  become: true

- name: VSCode repo
  ansible.builtin.apt_repository:
    repo: deb [arch=amd64] http://packages.microsoft.com/repos/code stable main
    state: present
    update_cache: true
  become: true

- name: Install VSCode
  ansible.builtin.apt:
    name: code
    state: present
    update_cache: true
  become: true
