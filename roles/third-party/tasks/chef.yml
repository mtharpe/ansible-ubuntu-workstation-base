---
- name: Check for Chef Workstation
  ansible.builtin.stat:
    path: /opt/chef-workstation/bin/chef
  register: chef_installed
  tags: [third_party, chef]

# Chef ships per-Ubuntu-release debs. Probe the URL for the running release
# first; if Chef hasn't published a build for it, skip rather than installing
# a 22.04 deb on (e.g.) 24.04 and hoping it works.
- name: Compute Chef Workstation deb URL for current release
  ansible.builtin.set_fact:
    chef_deb_url: "https://packages.chef.io/files/stable/chef-workstation/25.14.1/ubuntu/{{ ansible_facts['distribution_version'] }}/chef-workstation_25.14.1-1_amd64.deb"
  when: not chef_installed.stat.exists
  tags: [third_party, chef]

- name: Probe Chef Workstation deb for current Ubuntu release
  ansible.builtin.uri:
    url: "{{ chef_deb_url }}"
    method: HEAD
    status_code: [200, 301, 302]
  register: chef_probe
  failed_when: false
  changed_when: false
  when: not chef_installed.stat.exists
  tags: [third_party, chef]

- name: Note unavailable Chef Workstation deb
  ansible.builtin.debug:
    msg: "Chef Workstation 25.14.1 deb not published for Ubuntu {{ ansible_facts['distribution_version'] }} — skipping."
  when:
    - not chef_installed.stat.exists
    - chef_probe.status | default(0) != 200
  tags: [third_party, chef]

- name: Install Chef Workstation
  ansible.builtin.apt:
    deb: "{{ chef_deb_url }}"
    state: present
  retries: 3
  when:
    - not chef_installed.stat.exists
    - chef_probe.status | default(0) == 200
  become: true
  tags: [third_party, chef]
