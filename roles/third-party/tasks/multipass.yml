---
# Multipass on Linux is officially distributed only as a snap, so unlike the
# other third-party tasks this one *requires* snapd rather than removing it.
- name: Ensure snapd is installed
  ansible.builtin.apt:
    name: snapd
    state: present
    cache_valid_time: 3600
  become: true
  tags: [third_party, multipass]

- name: Check for snap CLI
  ansible.builtin.stat:
    path: /usr/bin/snap
  register: multipass_snap_bin
  changed_when: false
  tags: [third_party, multipass]

- name: Note missing snap CLI
  ansible.builtin.debug:
    msg: "snap CLI unavailable — skipping Multipass install."
  when: not multipass_snap_bin.stat.exists
  tags: [third_party, multipass]

- name: Probe installed multipass snap  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: snap list multipass
  register: multipass_snap_probe
  changed_when: false
  failed_when: false
  when: multipass_snap_bin.stat.exists
  tags: [third_party, multipass]

- name: Install Multipass snap  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: snap install multipass --classic
  become: true
  when:
    - multipass_snap_bin.stat.exists
    - multipass_snap_probe.rc | default(1) != 0
  changed_when: true
  tags: [third_party, multipass]
