---
# Install Lutris from the upstream GitHub release (the Lutris team's official
# .deb). Preferred over the PPA because the PPA lags on new Ubuntu releases,
# and snap/flatpak sandbox Wine in ways that break game installs.

- name: Remove conflicting Lutris snap
  ansible.builtin.include_tasks:
    file: remove-snap.yml
    apply:
      tags: [third_party, lutris]
  vars:
    snap_names: [lutris]
  tags: [third_party, lutris]

- name: Fetch latest Lutris release metadata
  ansible.builtin.uri:
    url: https://api.github.com/repos/lutris/lutris/releases/latest
    return_content: true
  register: lutris_release
  tags: [third_party, lutris]

- name: Resolve latest Lutris .deb URL and version
  ansible.builtin.set_fact:
    lutris_latest_version: "{{ lutris_release.json.tag_name | regex_replace('^v', '') }}"
    lutris_deb_url: >-
      {{ (lutris_release.json.assets
          | selectattr('name', 'match', '^lutris_.*\.deb$')
          | list | first).browser_download_url }}
  tags: [third_party, lutris]

- name: Check installed Lutris version
  ansible.builtin.command: dpkg-query -W -f=${Version} lutris
  register: lutris_installed_version
  changed_when: false
  failed_when: false
  tags: [third_party, lutris]

- name: Download Lutris .deb
  ansible.builtin.get_url:
    url: "{{ lutris_deb_url }}"
    dest: "/tmp/lutris-{{ lutris_latest_version }}.deb"
    mode: '0644'
  register: lutris_deb_download
  when: lutris_installed_version.stdout != lutris_latest_version
  tags: [third_party, lutris]

- name: Install Lutris .deb
  ansible.builtin.apt:
    deb: "{{ lutris_deb_download.dest }}"
    state: present
  become: true
  when:
    - lutris_installed_version.stdout != lutris_latest_version
    - lutris_deb_download is succeeded
  tags: [third_party, lutris]

- name: Install Wine
  ansible.builtin.apt:
    name: wine
    state: present
  become: true
  tags: [third_party, lutris]

- name: Install Vulkan loader
  ansible.builtin.apt:
    name:
      - libvulkan1
      - mesa-vulkan-drivers
      - vulkan-tools
    state: present
  become: true
  tags: [third_party, lutris]

- name: Install supporting libraries for Lutris
  ansible.builtin.apt:
    name:
      - libfreetype6
      - libgnutls30
      - libldap-2.5-0
      - libgpg-error0
    state: present
  become: true
  failed_when: false
  tags: [third_party, lutris]
