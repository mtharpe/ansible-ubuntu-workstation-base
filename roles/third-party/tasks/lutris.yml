---
# Install Lutris from the upstream GitHub release (the Lutris team's official
# .deb). Preferred over the PPA because the PPA lags on new Ubuntu releases,
# and snap/flatpak sandbox Wine in ways that break game installs.

- name: Remove conflicting Lutris snap
  ansible.builtin.include_tasks:
    file: remove-snap.yml
    apply:
      tags: [third_party, lutris]
  vars:
    snap_names: [lutris]
  tags: [third_party, lutris]

# Battle.net's installer + many Wine prefixes are 32-bit, so dpkg has to know
# about the i386 architecture before any :i386 package can be pulled in.
- name: Enable i386 multilib for 32-bit Wine/Battle.net libs
  ansible.builtin.include_tasks:
    file: enable-multilib.yml
    apply:
      tags: [third_party, lutris]
  tags: [third_party, lutris]

- name: Fetch latest Lutris release metadata
  ansible.builtin.uri:
    url: https://api.github.com/repos/lutris/lutris/releases/latest
    return_content: true
  register: lutris_release
  tags: [third_party, lutris]

- name: Resolve latest Lutris .deb URL and version
  ansible.builtin.set_fact:
    lutris_latest_version: "{{ lutris_release.json.tag_name | regex_replace('^v', '') }}"
    lutris_deb_url: >-
      {{ (lutris_release.json.assets
          | selectattr('name', 'match', '^lutris_.*\.deb$')
          | list | first).browser_download_url }}
  tags: [third_party, lutris]

- name: Check installed Lutris version
  ansible.builtin.command: dpkg-query -W -f=${Version} lutris
  register: lutris_installed_version
  changed_when: false
  failed_when: false
  tags: [third_party, lutris]

- name: Download Lutris .deb
  ansible.builtin.get_url:
    url: "{{ lutris_deb_url }}"
    dest: "/tmp/lutris-{{ lutris_latest_version }}.deb"
    mode: '0644'
  register: lutris_deb_download
  when: lutris_installed_version.stdout == "" or lutris_installed_version.stdout is version(lutris_latest_version, '<')
  tags: [third_party, lutris]

- name: Install Lutris .deb
  ansible.builtin.apt:
    deb: "{{ lutris_deb_download.dest }}"
    state: present
  become: true
  when:
    - lutris_installed_version.stdout == "" or lutris_installed_version.stdout is version(lutris_latest_version, '<')
    - lutris_deb_download is succeeded
  tags: [third_party, lutris]

- name: Install Wine
  ansible.builtin.apt:
    name: wine
    state: present
  become: true
  tags: [third_party, lutris]

- name: Install Vulkan loader
  ansible.builtin.apt:
    name:
      - libvulkan1
      - mesa-vulkan-drivers
      - mesa-utils
      - vulkan-tools
    state: present
  become: true
  tags: [third_party, lutris]

- name: Install supporting libraries for Lutris
  ansible.builtin.apt:
    name:
      - libfreetype6
      - libgnutls30
      - libldap-2.5-0
      - libgpg-error0
    state: present
  become: true
  failed_when: false
  tags: [third_party, lutris]

# Lutris's installer scripts shell out to these for archive extraction, MIDI
# soundfonts, MIME sniffing, and the optional certutil-based Battle.net cert
# import. python-is-python3 wires `python` -> python3 for installer hooks that
# assume an unversioned python.
- name: Install Lutris runtime helpers (extractors, soundfont, MIME, certutil)
  ansible.builtin.apt:
    name:
      - 7zip
      - cabextract
      - fluid-soundfont-gs
      - libnss3-tools
      - python-is-python3
      - python3-lxml
      - python3-magic
    state: present
  become: true
  tags: [third_party, lutris]

# Battle.net's launcher and most Windows games shipped through Lutris are
# 32-bit. Wine needs the matching :i386 copies of these libs or installs fail
# at runtime with cryptic Wine errors. Package names track Ubuntu 24.04's t64
# transition (libcurl4t64, libasound2t64, libgnutls30t64).
- name: Install 32-bit (i386) Wine/Battle.net runtime libraries
  ansible.builtin.apt:
    name:
      - libasound2t64:i386
      - libcurl3t64-gnutls:i386
      - libcurl4t64:i386
      - libdbus-1-3:i386
      - libfreetype6:i386
      - libgl1:i386
      - libgnutls30t64:i386
      - libgpg-error0:i386
      - libldap2:i386
      - libnss3:i386
      - libsdl2-2.0-0:i386
      - libsqlite3-0:i386
      - libvulkan1:i386
      - libxml2-16:i386
    state: present
  become: true
  failed_when: false
  tags: [third_party, lutris]
