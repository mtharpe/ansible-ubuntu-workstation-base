---
- name: Remove conflicting Steam snap
  ansible.builtin.include_tasks:
    file: remove-snap.yml
    apply:
      tags: [third_party, steam]
  vars:
    snap_names: [steam]
  tags: [third_party, steam]

# steam-installer pulls in 32-bit runtime libs; multilib must be enabled
# before apt will resolve them.
- name: Enable i386 multilib for Steam runtime
  ansible.builtin.include_tasks:
    file: enable-multilib.yml
    apply:
      tags: [third_party, steam]
  tags: [third_party, steam]

- name: Enable multiverse repository for Steam
  ansible.builtin.apt_repository:
    repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_facts['distribution_release'] }} multiverse"
    state: present
    update_cache: false
  become: true
  register: steam_multiverse_added
  tags: [third_party, steam]

- name: Refresh apt cache after enabling multiverse for Steam  # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  become: true
  when: steam_multiverse_added is changed
  changed_when: false
  tags: [third_party, steam]

# steam-installer is the canonical multiverse package on Ubuntu 24.04 — it
# pulls in the i386 runtime and the official Steam bootstrapper. mangohud is
# the FPS/VRAM/CPU overlay used by both Steam and Lutris (toggled per-game).
- name: Install Steam and MangoHud overlay
  ansible.builtin.apt:
    name:
      - steam-installer
      - mangohud
    state: present
  become: true
  failed_when: false
  tags: [third_party, steam]
