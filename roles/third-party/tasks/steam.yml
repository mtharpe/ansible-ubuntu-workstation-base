---
- name: Enable multiverse repository for Steam
  ansible.builtin.apt_repository:
    repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_distribution_release }} multiverse"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  tags: [third_party, steam]

- name: Install Steam
  ansible.builtin.apt:
    name: steam
    state: present
  become: true
  failed_when: false
  tags: [third_party, steam]
