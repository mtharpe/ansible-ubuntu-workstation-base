---
- name: Remove conflicting Zoom snap
  ansible.builtin.include_tasks:
    file: remove-snap.yml
    apply:
      tags: [third_party, zoom]
  vars:
    snap_names: [zoom-client]
  tags: [third_party, zoom]

- name: Download Zoom deb
  ansible.builtin.get_url:
    url: https://zoom.us/client/latest/zoom_amd64.deb
    dest: /tmp/zoom_amd64.deb
    mode: "0644"
  tags: [third_party, zoom]

- name: Install Zoom deb
  ansible.builtin.apt:
    deb: /tmp/zoom_amd64.deb
    state: present
  become: true
  tags: [third_party, zoom]
