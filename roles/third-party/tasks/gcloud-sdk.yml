---
- name: Probe Google Cloud SDK apt repo
  ansible.builtin.uri:
    url: https://packages.cloud.google.com/apt/dists/cloud-sdk/Release
    method: HEAD
    status_code: [200, 301, 302]
  register: gcloud_probe
  failed_when: false
  changed_when: false
  tags: [third_party, gcloud]

- name: Note unreachable Google Cloud SDK repo
  ansible.builtin.debug:
    msg: "Google Cloud SDK apt repo unreachable — skipping."
  when: gcloud_probe.status | default(0) != 200
  tags: [third_party, gcloud]

- name: Fetch Google Cloud SDK signing key
  ansible.builtin.get_url:
    url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
    dest: /tmp/google-cloud-keyring.gpg
    mode: '0644'
    force: false
  become: true
  when: gcloud_probe.status | default(0) == 200
  tags: [third_party, gcloud]

- name: Install Google Cloud SDK signing key (dearmored)
  ansible.builtin.shell:
    cmd: gpg --dearmor < /tmp/google-cloud-keyring.gpg > /usr/share/keyrings/google-cloud-keyring.gpg
    creates: /usr/share/keyrings/google-cloud-keyring.gpg
  become: true
  when: gcloud_probe.status | default(0) == 200
  tags: [third_party, gcloud]

- name: Check if Google Cloud repo file exists
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/google-cloud-sdk.list
  register: gcloud_repo
  when: gcloud_probe.status | default(0) == 200
  tags: [third_party, gcloud]

- name: Add Google Cloud SDK repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/google-cloud-keyring.gpg]
      https://packages.cloud.google.com/apt cloud-sdk main"
    state: present
    filename: google-cloud-sdk
    update_cache: false
  when:
    - gcloud_probe.status | default(0) == 200
    - not (gcloud_repo.stat.exists | default(false))
  become: true
  register: gcloud_repo_added
  tags: [third_party, gcloud]

- name: Refresh apt cache after adding Google Cloud SDK repo  # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  become: true
  when: gcloud_repo_added is changed
  changed_when: false
  tags: [third_party, gcloud]

- name: Install Google Cloud SDK packages
  ansible.builtin.apt:
    name:
      - google-cloud-sdk
      - kubectl
    state: present
    cache_valid_time: 3600
  become: true
  when: gcloud_probe.status | default(0) == 200
  tags: [third_party, gcloud]
