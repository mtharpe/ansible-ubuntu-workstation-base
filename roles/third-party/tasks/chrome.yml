---
- name: Probe Google Chrome apt repo
  ansible.builtin.uri:
    url: http://dl.google.com/linux/chrome/deb/dists/stable/Release
    method: HEAD
    status_code: [200, 301, 302]
  register: chrome_probe
  failed_when: false
  changed_when: false
  tags: [third_party, chrome]

- name: Note unreachable Google Chrome repo
  ansible.builtin.debug:
    msg: "Google Chrome apt repo unreachable — skipping."
  when: chrome_probe.status | default(0) != 200
  tags: [third_party, chrome]

# apt-key is removed on modern Ubuntu — store the dearmored key in
# /usr/share/keyrings and reference it with signed-by= on the source line.
- name: Fetch Google Chrome signing key
  ansible.builtin.get_url:
    url: https://dl.google.com/linux/linux_signing_key.pub
    dest: /tmp/google-chrome-keyring.asc
    mode: '0644'
    force: false
  become: true
  when: chrome_probe.status | default(0) == 200
  tags: [third_party, chrome]

- name: Install Google Chrome signing key (dearmored)
  ansible.builtin.shell:
    cmd: gpg --dearmor < /tmp/google-chrome-keyring.asc > /usr/share/keyrings/google-chrome-keyring.gpg
    creates: /usr/share/keyrings/google-chrome-keyring.gpg
  become: true
  when: chrome_probe.status | default(0) == 200
  tags: [third_party, chrome]

- name: Check if Google Chrome repo exists
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/google-chrome.list
  register: google_chrome_repo
  when: chrome_probe.status | default(0) == 200
  tags: [third_party, chrome]

- name: Add Google Chrome repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg]
      http://dl.google.com/linux/chrome/deb/ stable main"
    state: present
    filename: google-chrome
    update_cache: false
  when:
    - chrome_probe.status | default(0) == 200
    - not (google_chrome_repo.stat.exists | default(false))
  become: true
  register: google_chrome_repo_added
  tags: [third_party, chrome]

- name: Refresh apt cache after adding Google Chrome repo  # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  become: true
  when: google_chrome_repo_added is changed
  changed_when: false
  tags: [third_party, chrome]

- name: Install Google Chrome
  ansible.builtin.apt:
    name: google-chrome-stable
    state: present
    cache_valid_time: 3600
  become: true
  when: chrome_probe.status | default(0) == 200
  tags: [third_party, chrome]

- name: Check for user google-chrome.desktop
  ansible.builtin.stat:
    path: /home/{{ local_user }}/.local/share/applications/google-chrome.desktop
  register: google_chrome_desktop
  tags: [third_party, chrome]

- name: Ensure user applications directory exists
  ansible.builtin.file:
    path: /home/{{ local_user }}/.local/share/applications
    state: directory
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: "0755"
  become: true
  tags: [third_party, chrome]

- name: Deploy user google-chrome.desktop
  ansible.builtin.copy:
    src: templates/gnome_desktop/google-chrome.desktop
    dest: /home/{{ local_user }}/.local/share/applications/google-chrome.desktop
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: "0644"
  when: not google_chrome_desktop.stat.exists
  tags: [third_party, chrome]
