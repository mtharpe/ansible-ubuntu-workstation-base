---
- name: Probe Google Chrome apt repo
  ansible.builtin.uri:
    url: http://dl.google.com/linux/chrome/deb/dists/stable/Release
    method: HEAD
    status_code: [200, 301, 302]
  register: chrome_probe
  failed_when: false
  changed_when: false
  tags: [third_party, chrome]

- name: Note unreachable Google Chrome repo
  ansible.builtin.debug:
    msg: "Google Chrome apt repo unreachable — skipping."
  when: chrome_probe.status | default(0) != 200
  tags: [third_party, chrome]

# The `google-chrome-stable` deb's postinst writes
# /etc/apt/sources.list.d/google-chrome.sources (deb822) with
# Signed-By=/usr/share/keyrings/google-chrome.gpg and
# URIs=https://dl.google.com/linux/chrome-stable/deb/. Write the same file
# (and use the same keyring path) ourselves so the repo is available for the
# install, and so that after install the two configurations don't disagree —
# which previously double-fetched chrome metadata and could trigger
# Signed-By/duplicate-target apt warnings. Any legacy google-chrome.list /
# google-chrome-keyring.gpg from prior runs is removed.
- name: Remove legacy Google Chrome source list (replaced by google-chrome.sources)
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/google-chrome.list
    state: absent
  become: true
  when: chrome_probe.status | default(0) == 200
  register: google_chrome_legacy_list
  tags: [third_party, chrome]

- name: Remove legacy Google Chrome keyring (replaced by google-chrome.gpg)
  ansible.builtin.file:
    path: /usr/share/keyrings/google-chrome-keyring.gpg
    state: absent
  become: true
  when: chrome_probe.status | default(0) == 200
  tags: [third_party, chrome]

- name: Fetch Google Chrome signing key
  ansible.builtin.get_url:
    url: https://dl.google.com/linux/linux_signing_key.pub
    dest: /tmp/google-chrome-keyring.asc
    mode: '0644'
    force: false
  become: true
  when: chrome_probe.status | default(0) == 200
  tags: [third_party, chrome]

- name: Install Google Chrome signing key (dearmored)
  ansible.builtin.shell:
    cmd: gpg --dearmor < /tmp/google-chrome-keyring.asc > /usr/share/keyrings/google-chrome.gpg
    creates: /usr/share/keyrings/google-chrome.gpg
  become: true
  when: chrome_probe.status | default(0) == 200
  tags: [third_party, chrome]

- name: Add Google Chrome repo (deb822, matches `google-chrome-stable` postinst output)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/google-chrome.sources
    content: |
      X-Repolib-Name: Google Chrome
      Types: deb
      URIs: https://dl.google.com/linux/chrome-stable/deb/
      Suites: stable
      Components: main
      Signed-By: /usr/share/keyrings/google-chrome.gpg
    owner: root
    group: root
    mode: '0644'
  become: true
  when: chrome_probe.status | default(0) == 200
  register: google_chrome_repo_added
  tags: [third_party, chrome]

- name: Refresh apt cache after adding Google Chrome repo  # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  become: true
  when: (google_chrome_repo_added is changed) or (google_chrome_legacy_list is changed)
  changed_when: false
  tags: [third_party, chrome]

- name: Install Google Chrome
  ansible.builtin.apt:
    name: google-chrome-stable
    state: present
    cache_valid_time: 3600
  become: true
  when: chrome_probe.status | default(0) == 200
  tags: [third_party, chrome]

- name: Ensure user applications directory exists
  ansible.builtin.file:
    path: /home/{{ local_user }}/.local/share/applications
    state: directory
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: "0755"
  become: true
  tags: [third_party, chrome]

- name: Deploy user google-chrome.desktop
  ansible.builtin.copy:
    src: templates/gnome_desktop/google-chrome.desktop
    dest: /home/{{ local_user }}/.local/share/applications/google-chrome.desktop
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: "0644"
  tags: [third_party, chrome]
