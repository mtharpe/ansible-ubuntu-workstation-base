---
- name: Remove conflicting Alacritty snap
  ansible.builtin.include_tasks:
    file: remove-snap.yml
    apply:
      tags: [third_party, alacritty]
  vars:
    snap_names: [alacritty]
  tags: [third_party, alacritty]

# Ubuntu 24.04's apt-shipped alacritty is 0.13.2, which doesn't recognize the
# [terminal] / [general] sections introduced in 0.14 — produces "Unused config
# key: shell" / "Unused config key: general" warnings. The aslatter PPA tracks
# upstream alacritty releases for current LTS (0.14+ at time of writing), so
# the same alacritty.toml works on Ubuntu, Fedora, and Manjaro.
- name: Install PPA prerequisites
  ansible.builtin.apt:
    name:
      - software-properties-common
      - python3-debian
    state: present
    cache_valid_time: 3600
  become: true
  tags: [third_party, alacritty]

- name: Add Aslatter Alacritty PPA (Ubuntu only)
  ansible.builtin.apt_repository:
    repo: ppa:aslatter/ppa
    state: present
    update_cache: true
  become: true
  tags: [third_party, alacritty]

- name: Install alacritty (from PPA)
  ansible.builtin.apt:
    name: alacritty
    state: present
    cache_valid_time: 3600
  become: true
  tags: [third_party, alacritty]

- name: Create a directory if it does not exist
  ansible.builtin.file:
    path: /home/{{ local_user }}/.config/alacritty
    state: directory
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: "0755"

- name: Template alacritty.toml
  ansible.builtin.template:
    src: templates/alacritty.toml
    dest: /home/{{ local_user }}/.config/alacritty/alacritty.toml
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: "0644"

- name: Ensure user applications directory exists
  ansible.builtin.file:
    path: /home/{{ local_user }}/.local/share/applications
    state: directory
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: "0755"
  become: true

# Probe the system for which terminal icon is actually installed and pick the
# first one that exists (priority: newest GNOME terminal first, falling back
# to alacritty's own icon, then the freedesktop generic). Avoids per-distro
# hardcoding — Ubuntu 24.04 ships gnome-terminal, Fedora 41+ ships Ptyxis,
# etc. — and survives icon-name churn between releases.
- name: Probe for an installed terminal icon
  ansible.builtin.shell: |
    set -o pipefail
    matches="$(find /usr/share/icons /usr/share/pixmaps -maxdepth 6 \
        \( -name 'org.gnome.Ptyxis.*' -o -name 'org.gnome.Console.*' \
           -o -name 'org.gnome.Terminal.*' -o -name 'Alacritty.*' \
           -o -name 'utilities-terminal.*' \) \
        -printf '%f\n' 2>/dev/null | sort -u)"
    for name in org.gnome.Ptyxis org.gnome.Console org.gnome.Terminal Alacritty utilities-terminal; do
      if echo "${matches}" | grep -q "^${name}\."; then
        echo "${name}"
        break
      fi
    done
  args:
    executable: /bin/bash
  register: alacritty_icon_probe
  changed_when: false
  tags: [third_party, alacritty]

- name: Set fact alacritty_terminal_icon
  ansible.builtin.set_fact:
    alacritty_terminal_icon: "{{ (alacritty_icon_probe.stdout | trim) or 'utilities-terminal' }}"
  tags: [third_party, alacritty]

- name: Template alacritty.desktop
  ansible.builtin.template:
    src: templates/gnome_desktop/alacritty.desktop
    dest: /home/{{ local_user }}/.local/share/applications/alacritty.desktop
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: "0644"

- name: Drop legacy Alacritty.desktop cleanup cron (replaced by user overrides)
  ansible.builtin.cron:
    name: "Remove Alacritty.desktop"
    state: absent
    user: root
  become: true

# Shadow the distro's default terminal launchers with empty user-level
# overrides flagged NoDisplay/Hidden. This survives package updates
# (unlike renaming the system .desktop) and avoids confusion with the
# Alacritty launcher we ship as "Terminal".
- name: Hide default distro terminal launchers from GNOME Shell
  ansible.builtin.copy:
    dest: "/home/{{ local_user }}/.local/share/applications/{{ item }}"
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: "0644"
    content: |
      [Desktop Entry]
      Type=Application
      NoDisplay=true
      Hidden=true
  loop:
    - org.gnome.Terminal.desktop
    - org.gnome.Console.desktop
    - org.gnome.Ptyxis.desktop
    - kgx.desktop
    - Alacritty.desktop
