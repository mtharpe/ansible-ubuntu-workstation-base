---
- name: Check if Gnome Shell extension is already installed - {{ gnome_extension_info.name }}
  ansible.builtin.stat:
    path: "/home/{{ local_user }}/.local/share/gnome-shell/extensions/{{ gnome_extension_info.uuid }}/metadata.json"
  register: gnome_extension_check_existing

- name: Create temporary download directory
  ansible.builtin.tempfile:
    state: directory
    suffix: ".gnome_extension_download"
  register: gnome_extension_download_dir
  changed_when: false
  when: not gnome_extension_check_existing.stat.exists

- name: Download and Install Gnome Shell extension - {{ gnome_extension_info.name }} # noqa: partial-become no-changed-when key-order
  block:
    - name: Download Gnome Shell extension - {{ gnome_extension_info.name }} # noqa: risky-file-permissions
      ansible.builtin.get_url:
        url: https://extensions.gnome.org{{ gnome_extension_info.download_url }}
        dest: "{{ gnome_extension_download_dir.path }}/{{ gnome_extension_info.uuid }}.zip"
      register: gnome_extension_download

    - name: Create install directory - {{ gnome_extension_info.name }}
      ansible.builtin.file:
        path: "/home/{{ local_user }}/.local/share/gnome-shell/extensions/{{ gnome_extension_info.uuid }}"
        state: directory
        owner: "{{ local_user }}"
        group: "{{ local_user }}"
        mode: "0755"

    - name: Install Gnome Shell extension - {{ gnome_extension_info.name }}
      ansible.builtin.unarchive:
        src: "{{ gnome_extension_download.dest }}"
        dest: "/home/{{ local_user }}/.local/share/gnome-shell/extensions/{{ gnome_extension_info.uuid }}"
        remote_src: true

    - name: Get enabled Gnome Shell extensions
      ansible.builtin.command: gsettings get org.gnome.shell enabled-extensions
      become: true
      become_user: "{{ local_user }}"
      register: gnome_enabled_extensions
      changed_when: false

    - name: Check for gnome-shell-extension-tool
      ansible.builtin.command: command -v gnome-shell-extension-tool
      become: true
      become_user: "{{ local_user }}"
      register: gnome_extension_tool
      changed_when: false
      failed_when: false

    - name: Enable Gnome Shell extension via tool - {{ gnome_extension_info.name }} # noqa: partial-become no-changed-when
      ansible.builtin.command: gnome-shell-extension-tool --enable-extension {{ gnome_extension_info.uuid }}
      become: true
      become_user: "{{ local_user }}"
      when:
        - gnome_extension_info.uuid not in gnome_enabled_extensions.stdout
        - gnome_extension_tool.rc == 0

    - name: Enable Gnome Shell extension via gsettings fallback - {{ gnome_extension_info.name }} # noqa: partial-become no-changed-when
      ansible.builtin.shell: |
        python3 - <<'PY'
        import ast
        import subprocess
        extensions = ast.literal_eval(subprocess.check_output([
            "gsettings", "get", "org.gnome.shell", "enabled-extensions"
        ], text=True).strip())
        if "{{ gnome_extension_info.uuid }}" not in extensions:
            extensions.append("{{ gnome_extension_info.uuid }}")
            subprocess.check_call([
                "gsettings", "set", "org.gnome.shell", "enabled-extensions", str(extensions)
            ])
        PY
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ local_user }}"
      when:
        - gnome_extension_info.uuid not in gnome_enabled_extensions.stdout
        - gnome_extension_tool.rc != 0
      changed_when: gnome_extension_info.uuid not in gnome_enabled_extensions.stdout
  always:
    - name: Delete temporary download directory
      ansible.builtin.file:
        path: "{{ gnome_extension_download_dir.path }}"
        state: absent
      changed_when: false
  when: not gnome_extension_check_existing.stat.exists
