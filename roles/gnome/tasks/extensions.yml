---
# Install + enable a curated set of GNOME Shell extensions whose ZIP is
# fetched from extensions.gnome.org for the running shell version. Skipped
# silently in containers and on machines without GNOME Shell. UUIDs come
# from `gnome_extensions` in vars/vars.yml so the user can customize.

- name: Detect GNOME Shell version
  ansible.builtin.command: gnome-shell --version
  register: gnome_shell_ver
  changed_when: false
  failed_when: false
  when: not is_container | default(false)
  tags: [gnome, extensions]

- name: Set GNOME Shell major version fact
  ansible.builtin.set_fact:
    gnome_ext_shell_major: "{{ (gnome_shell_ver.stdout | regex_search('GNOME Shell ([0-9]+)', '\\1') | first) | default('') }}"
  when:
    - not is_container | default(false)
    - gnome_shell_ver.rc | default(1) == 0
  tags: [gnome, extensions]

- name: Check which target extensions are already installed locally
  ansible.builtin.command: "gnome-extensions info {{ item }}"
  register: gnome_ext_check
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ local_user }}"
  loop: "{{ gnome_extensions | default([]) }}"
  when:
    - not is_container | default(false)
    - gnome_ext_shell_major | default('') != ''
  tags: [gnome, extensions]

- name: Query extensions.gnome.org for matching version
  ansible.builtin.uri:
    url: "https://extensions.gnome.org/extension-info/?uuid={{ item.item }}&shell_version={{ gnome_ext_shell_major }}"
    return_content: true
    status_code: [200, 404]
  register: gnome_ext_info
  loop: "{{ gnome_ext_check.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default('skipped') }}"
  when:
    - not is_container | default(false)
    - gnome_ext_shell_major | default('') != ''
    - item.rc | default(1) != 0
  tags: [gnome, extensions]

- name: Warn on extensions with no compatible release
  ansible.builtin.debug:
    msg: "No GNOME {{ gnome_ext_shell_major }}-compatible release for {{ item.item.item }} — skipping."
  loop: "{{ gnome_ext_info.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item | default('skipped') }}"
  when:
    - item.skipped is not defined
    - item.status | default(0) != 200 or item.json.download_url | default('') == ''
  tags: [gnome, extensions]

- name: Download extension zip
  ansible.builtin.get_url:
    url: "https://extensions.gnome.org{{ item.json.download_url }}"
    dest: "/tmp/{{ item.json.uuid }}.shell-extension.zip"
    mode: '0644'
  loop: "{{ gnome_ext_info.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item | default('skipped') }}"
  when:
    - item.skipped is not defined
    - item.status | default(0) == 200
    - item.json.download_url | default('') != ''
  tags: [gnome, extensions]

- name: Install extension
  ansible.builtin.command: "gnome-extensions install --force /tmp/{{ item.json.uuid }}.shell-extension.zip"
  become: true
  become_user: "{{ local_user }}"
  loop: "{{ gnome_ext_info.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item | default('skipped') }}"
  when:
    - item.skipped is not defined
    - item.status | default(0) == 200
    - item.json.download_url | default('') != ''
  changed_when: true
  tags: [gnome, extensions]

- name: Enable extensions (best-effort, requires active user session)
  ansible.builtin.shell: |
    export XDG_RUNTIME_DIR="/run/user/$(id -u)"
    export DBUS_SESSION_BUS_ADDRESS="unix:path=$XDG_RUNTIME_DIR/bus"
    gnome-extensions enable {{ item }}
  become: true
  become_user: "{{ local_user }}"
  loop: "{{ gnome_extensions | default([]) }}"
  when:
    - not is_container | default(false)
    - gnome_ext_shell_major | default('') != ''
  changed_when: false
  failed_when: false
  tags: [gnome, extensions]
