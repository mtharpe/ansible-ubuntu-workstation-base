---
# GNOME's color-scheme + gtk-theme dconf keys only reach GTK3/4 libadwaita
# apps that actually consult them. Legacy toolkits miss out:
#   - GTK2 apps read ~/.gtkrc-2.0 and ignore dconf entirely (and Adwaita-dark
#     for GTK2 only exists if gnome-themes-extra is installed)
#   - Qt apps default to Fusion-light unless QT_QPA_PLATFORMTHEME points at
#     a Qt integration plugin (qgnomeplatform reads the same gsettings the
#     GNOME apps do, so dark mode propagates)
#   - GTK3 apps launched outside a logged-in GNOME session (e.g. from a
#     terminal over SSH or via systemd-run) don't see the dconf values and
#     need ~/.config/gtk-3.0/settings.ini as a fallback
# qgnomeplatform-qt6 isn't packaged on Ubuntu 24.04 (noble), so Qt6 apps
# can't go through the gsettings-aware platform theme route. Fall back to
# QT_STYLE_OVERRIDE below to force them onto adwaita-qt6's Adwaita-Dark
# style. Drop QT_STYLE_OVERRIDE and add qgnomeplatform-qt6 here once a
# future Ubuntu release packages it.
- name: Install legacy-toolkit dark-mode integration packages
  ansible.builtin.apt:
    name:
      - gnome-themes-extra
      - qgnomeplatform-qt5
      - adwaita-qt
      - adwaita-qt6
    state: present
    cache_valid_time: 3600
  become: true
  tags: [gnome, dark-mode]

- name: Ensure GTK config directories exist
  ansible.builtin.file:
    path: "/home/{{ local_user }}/{{ item }}"
    state: directory
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: "0755"
  become: true
  loop:
    - .config/gtk-3.0
    - .config/gtk-4.0
  tags: [gnome, dark-mode]

- name: Configure GTK2 dark theme (~/.gtkrc-2.0)
  ansible.builtin.copy:
    dest: "/home/{{ local_user }}/.gtkrc-2.0"
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: "0644"
    content: |
      # {{ ansible_managed }}
      gtk-theme-name = "Adwaita-dark"
      gtk-icon-theme-name = "Adwaita"
      gtk-cursor-theme-name = "Adwaita"
  become: true
  tags: [gnome, dark-mode]

- name: Configure GTK3 dark theme (~/.config/gtk-3.0/settings.ini)
  ansible.builtin.copy:
    dest: "/home/{{ local_user }}/.config/gtk-3.0/settings.ini"
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: "0644"
    content: |
      # {{ ansible_managed }}
      [Settings]
      gtk-application-prefer-dark-theme = 1
      gtk-theme-name = Adwaita-dark
      gtk-icon-theme-name = Adwaita
      gtk-cursor-theme-name = Adwaita
  become: true
  tags: [gnome, dark-mode]

- name: Configure GTK4 dark theme preference (~/.config/gtk-4.0/settings.ini)
  ansible.builtin.copy:
    dest: "/home/{{ local_user }}/.config/gtk-4.0/settings.ini"
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: "0644"
    content: |
      # {{ ansible_managed }}
      [Settings]
      gtk-application-prefer-dark-theme = 1
  become: true
  tags: [gnome, dark-mode]

# /etc/environment is read by PAM at login, so these need a session restart
# to take effect.
#   QT_QPA_PLATFORMTHEME=gnome   — Qt5 apps route through qgnomeplatform-qt5,
#                                  which reads org.gnome.desktop.interface
#                                  (so a single color-scheme flip moves them).
#   QT_STYLE_OVERRIDE=Adwaita-Dark — Qt6 fallback: with no qgnomeplatform-qt6
#                                    on noble, we force the adwaita-qt6 style
#                                    directly. Drop once qgnomeplatform-qt6
#                                    ships in a future Ubuntu release.
- name: Route Qt apps through the GNOME platform theme
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
    state: present
    create: false
  loop:
    - { key: "QT_QPA_PLATFORMTHEME", value: "gnome" }
    - { key: "QT_STYLE_OVERRIDE",    value: "Adwaita-Dark" }
  become: true
  tags: [gnome, dark-mode]
