---
- name: Enable net.ipv4.ip_forward
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-ansible.conf
    reload: true

- name: Set fs.inotify.max_user_watches to 524288
  ansible.posix.sysctl:
    name: fs.inotify.max_user_watches
    value: "524288"
    sysctl_file: /etc/sysctl.d/99-ansible.conf
    reload: true
  when: install_vscode | default(false)

- name: Allow sudo group to sudo without a password
  ansible.builtin.lineinfile:
    dest: /etc/sudoers
    state: present
    regexp: ^%sudo
    line: "%sudo ALL=(ALL) NOPASSWD: ALL"
    validate: visudo -cf %s

# UFW: install and configure a sensible desktop firewall
# Skipped in containers — ufw requires netfilter access not available in unprivileged containers.
#
# Allow rules MUST be added before `state: enabled`. Enabling sets default-deny
# on incoming, which would drop new SSH connections — including the one this
# play is running over, if invoked remotely.
- name: Configure ufw
  when: not is_container | default(false)
  block:
    - name: Ensure ufw is installed
      ansible.builtin.apt:
        name: ufw
        state: present
      become: true

    - name: Allow SSH (OpenSSH app profile)
      community.general.ufw:
        rule: allow
        name: OpenSSH
      become: true

    # mDNS for avahi (printer/service discovery), IPP for CUPS, DHCPv6 client.
    # Explicit port rules — the older `name: mdns` / `name: dhcpv6-client`
    # approach silently failed because those aren't standard UFW app profiles
    # nor /etc/services entries, which is how SSH ended up blocked on a fresh
    # machine.
    - name: Allow desktop service ports
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        comment: "{{ item.comment }}"
      loop:
        - { port: "5353", proto: "udp", comment: "mDNS (avahi / printer discovery)" }
        - { port: "631",  proto: "tcp", comment: "IPP (CUPS)" }
        - { port: "631",  proto: "udp", comment: "IPP discovery" }
        - { port: "546",  proto: "udp", comment: "DHCPv6 client" }
      become: true

    - name: Ensure configured ports are allowed
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ ufw_allowed_ports | default([]) }}"
      when: ufw_allowed_ports is defined and ufw_allowed_ports | length > 0
      become: true

    - name: Ensure ufw is enabled and running
      community.general.ufw:
        state: enabled
      become: true

# Configure git user settings
- name: Ensure .gitconfig exists in user home directory
  ansible.builtin.file:
    path: "/home/{{ local_user }}/.gitconfig"
    state: touch
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: '0644'
    modification_time: preserve
    access_time: preserve
  become: true

- name: Configure git user.name
  community.general.git_config:
    scope: global
    name: user.name
    value: "Michael Tharpe"
  become: true
  become_user: "{{ local_user }}"

- name: Configure git user.email
  community.general.git_config:
    scope: global
    name: user.email
    value: "mtharpe@users.noreply.github.com"
  become: true
  become_user: "{{ local_user }}"
