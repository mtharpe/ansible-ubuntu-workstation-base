---
- name: Enable net.ipv4.ip_forward
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true

- name: Set fs.inotify.max_user_watches to 524288
  ansible.posix.sysctl:
    name: fs.inotify.max_user_watches
    value: "524288"
    sysctl_set: true
    state: present
    reload: true
  when: install_vscode | default(false)

- name: Allow sudo group to sudo without a password
  ansible.builtin.lineinfile:
    dest: /etc/sudoers
    state: present
    regexp: ^%sudo
    line: "%sudo ALL=(ALL) NOPASSWD: ALL"
    validate: visudo -cf %s

# UFW: install and configure a sensible desktop firewall
# Skipped in containers — ufw requires netfilter access not available in unprivileged containers.
- name: Configure ufw
  when: not is_container | default(false)
  block:
    - name: Ensure ufw is installed
      ansible.builtin.apt:
        name: ufw
        state: present
      become: true

    - name: Ensure ufw is enabled and running
      community.general.ufw:
        state: enabled
      become: true

    - name: Ensure common desktop services are allowed
      community.general.ufw:
        rule: allow
        name: "{{ item }}"
      loop: "{{ firewalld_allowed_services | default(['ssh', 'mdns', 'dhcpv6-client']) }}"
      become: true
      failed_when: false

    - name: Ensure configured ports are allowed
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ firewalld_allowed_ports | default([]) }}"
      when: firewalld_allowed_ports is defined and firewalld_allowed_ports | length > 0
      become: true

# Configure git user settings
- name: Ensure .gitconfig exists in user home directory
  ansible.builtin.file:
    path: "/home/{{ local_user }}/.gitconfig"
    state: touch
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: '0644'
    modification_time: preserve
    access_time: preserve
  become: true

- name: Configure git user.name
  community.general.git_config:
    scope: global
    name: user.name
    value: "Michael Tharpe"
  become: true
  become_user: "{{ local_user }}"

- name: Configure git user.email
  community.general.git_config:
    scope: global
    name: user.email
    value: "mtharpe@users.noreply.github.com"
  become: true
  become_user: "{{ local_user }}"
