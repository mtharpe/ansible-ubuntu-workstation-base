---
# apt speed + resilience tuning — drop in BEFORE the first big install so
# the savings apply.
#
# Acquire::ForceIPv4 — on networks where IPv6 routing is broken, slow, or
#   rate-limited, apt would otherwise spend 30s+ timing out v6 connects to
#   each mirror before falling back to v4. This is the single biggest fix
#   for "apt update is mysteriously slow on my network".
# Acquire::http::Timeout / https::Timeout — cap any one mirror's hang at
#   30s instead of the default 120s.
# Acquire::Languages "en" — skip translation downloads for ~100 locales,
#   which is often the slowest part of `apt update`.
# Acquire::Retries "5" — recover from a momentarily flaky mirror without
#   failing the whole task.
# APT::Get::List-Cleanup "false" — don't delete old indices on every run.
- name: Optimize apt for slow / flaky networks
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/99-speed
    content: |
      Acquire::ForceIPv4 "true";
      Acquire::http::Timeout "30";
      Acquire::https::Timeout "30";
      Acquire::Languages "en";
      Acquire::Retries "5";
      APT::Get::List-Cleanup "false";
    owner: root
    group: root
    mode: '0644'
  become: true

# `apt-transport-https` is a transitional no-op on Ubuntu 18.04+ — apt has
# native HTTPS support. Dropped to save one round-trip.
- name: Ensure apt transport dependencies are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true

# HashiCorp — store the dearmored key in /usr/share/keyrings and
# reference it with signed-by= so apt sources line up cleanly with any
# package-shipped source list (avoids "Conflicting Signed-By" errors).
#
# HashiCorp's apt repo is keyed on the Ubuntu release codename, so a brand-new
# (or very old) Ubuntu won't have a matching pocket. Probe it before adding
# the source — otherwise the next `apt update` would fail hard with 404s.
- name: Probe HashiCorp repo for current Ubuntu release
  ansible.builtin.uri:
    url: "https://apt.releases.hashicorp.com/dists/{{ ansible_distribution_release }}/Release"
    method: HEAD
    status_code: [200, 301, 302]
  register: common_hashicorp_probe
  failed_when: false
  changed_when: false

- name: Note unsupported HashiCorp release
  ansible.builtin.debug:
    msg: "HashiCorp apt repo has no pocket for '{{ ansible_distribution_release }}' — skipping."
  when: common_hashicorp_probe.status | default(0) != 200

- name: Fetch HashiCorp signing key
  ansible.builtin.get_url:
    url: https://apt.releases.hashicorp.com/gpg
    dest: /tmp/hashicorp-archive-keyring.asc
    mode: '0644'
    force: false
  become: true
  when: common_hashicorp_probe.status | default(0) == 200

- name: Install HashiCorp signing key (dearmored)
  ansible.builtin.shell:
    cmd: gpg --dearmor < /tmp/hashicorp-archive-keyring.asc > /usr/share/keyrings/hashicorp-archive-keyring.gpg
    creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg
  become: true
  when: common_hashicorp_probe.status | default(0) == 200

- name: Add HashiCorp repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg]
      https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
    state: present
    filename: hashicorp
    update_cache: false
  become: true
  register: common_hashicorp_repo
  when: common_hashicorp_probe.status | default(0) == 200

# 1Password — must use signed-by=/usr/share/keyrings/1password-archive-keyring.gpg
# to match the source list shipped by the 1password package itself; otherwise
# apt refuses to load the conflicting source.
- name: Probe 1Password apt repo
  ansible.builtin.uri:
    url: https://downloads.1password.com/linux/debian/amd64/dists/stable/Release
    method: HEAD
    status_code: [200, 301, 302]
  register: common_onepassword_probe
  failed_when: false
  changed_when: false

- name: Note unreachable 1Password repo
  ansible.builtin.debug:
    msg: "1Password apt repo unreachable — skipping."
  when: common_onepassword_probe.status | default(0) != 200

- name: Fetch 1Password signing key
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: /tmp/1password-archive-keyring.asc
    mode: '0644'
    force: false
  become: true
  when: common_onepassword_probe.status | default(0) == 200

- name: Install 1Password signing key (dearmored)
  ansible.builtin.shell:
    cmd: gpg --dearmor < /tmp/1password-archive-keyring.asc > /usr/share/keyrings/1password-archive-keyring.gpg
    creates: /usr/share/keyrings/1password-archive-keyring.gpg
  become: true
  when: common_onepassword_probe.status | default(0) == 200

- name: Add 1Password repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/1password-archive-keyring.gpg]
      https://downloads.1password.com/linux/debian/amd64 stable main"
    state: present
    filename: 1password
    update_cache: false
  become: true
  register: common_onepassword_repo
  when: common_onepassword_probe.status | default(0) == 200

# Surface repo-availability flags so later roles (packages.yml) can skip
# installs for repos that weren't added.
- name: Record external repo availability
  ansible.builtin.set_fact:
    common_hashicorp_repo_available: "{{ common_hashicorp_probe.status | default(0) == 200 }}"
    common_onepassword_repo_available: "{{ common_onepassword_probe.status | default(0) == 200 }}"

# Single apt-update at the end — only fires when one of the repos above
# actually changed, so re-runs against an already-configured box are a no-op.
- name: Refresh apt metadata
  ansible.builtin.apt:
    update_cache: true
  become: true
  changed_when: false
  when: (common_hashicorp_repo is changed) or (common_onepassword_repo is changed)
