---
# Workstation performance tuning. Idempotent and skipped in containers.
# Sysctl values target a Chrome-heavy desktop where zram is the swap
# target (so paging is cheap):
# - swappiness=180: lean into zram early instead of pushing back on apps
# - page-cluster=0: read pages one at a time (optimal for zstd-compressed zram)
# - vfs_cache_pressure=50: keep inode/dentry cache longer (faster file ops)
# - dirty_ratio=10 / dirty_background_ratio=5: flush sooner so big writes
#   don't stall interactive apps
# - kernel.sysrq=1: enable SysRq for emergency keyboard recovery

- name: Apply desktop performance sysctl
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-ansible-performance.conf
    reload: true
  become: true
  loop:
    - { name: vm.swappiness, value: '180' }
    - { name: vm.page-cluster, value: '0' }
    - { name: vm.vfs_cache_pressure, value: '50' }
    - { name: vm.dirty_ratio, value: '10' }
    - { name: vm.dirty_background_ratio, value: '5' }
    - { name: kernel.sysrq, value: '1' }
  when: not is_container | default(false)

- name: Enable fstrim.timer for periodic SSD trim
  ansible.builtin.systemd:
    name: fstrim.timer
    enabled: true
    state: started
  become: true
  when: not is_container | default(false)
  failed_when: false

# zram: compressed RAM-backed swap. With zstd, ~3x compression effective,
# so 8 GiB zram on a 16 GiB box gives ~5 GiB extra usable anon memory
# under pressure at the cost of CPU. Sized at half RAM, capped at 16 GiB.
- name: Install systemd-zram-generator
  ansible.builtin.apt:
    name: systemd-zram-generator
    state: present
  become: true
  when: not is_container | default(false)

- name: Configure zram-generator
  ansible.builtin.copy:
    dest: /etc/systemd/zram-generator.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # ansible-managed
      [zram0]
      zram-size = min(ram / 2, 16384)
      compression-algorithm = zstd
      swap-priority = 100
      fs-type = swap
  become: true
  register: zram_conf
  when: not is_container | default(false)

- name: Reload systemd to register zram units
  ansible.builtin.systemd:
    daemon_reload: true
  become: true
  when:
    - not is_container | default(false)
    - zram_conf is changed

- name: Activate zram swap now
  ansible.builtin.systemd:
    name: dev-zram0.swap
    state: started
  become: true
  when: not is_container | default(false)
  failed_when: false

# Ubuntu-specific: disable services that slow boot or run background
# work for features we don't use on a workstation.
- name: Disable Ubuntu services that hurt interactive performance
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
    masked: true
  become: true
  loop:
    - apport.service
    - NetworkManager-wait-online.service
    - motd-news.timer
  when: not is_container | default(false)
  failed_when: false
