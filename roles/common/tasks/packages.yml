---
# Install extra packages
- name: Install base packages
  ansible.builtin.apt:
    name:
      - 1password
      - direnv
      - fail2ban
      - arpwatch
      - autoconf
      - autofs
      - automake
      - bat
      - build-essential
      - cmake
      - curl
      - dconf-editor
      - ufw
      - golang
      - gh
      - htop
      - iotop
      - jq
      - lshw
      - lsscsi
      - nfs-common
      - ngrep
      - nmap
      - nmon
      - npm
      - ripgrep
      - speedtest-cli
      - sysstat
      - tmux
      - transmission
      - neovim
      - terraform
      - vault
      - consul
      - nomad
      - packer
      - python3-psutil
      - python3-pip
      - python3-termcolor
      - unzip
      - alacritty
      - vlc
      - util-linux
      - nextcloud-desktop
      - gnome-extensions-app
      - gnome-tweaks
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true

# Ansible itself is a prerequisite to run this playbook, so re-installing via apt
# is redundant. Skip in containers because the Ubuntu `ansible` package
# triggers a long py_compile postinst that times out small CI VMs.
- name: Install Ansible tooling
  ansible.builtin.apt:
    name:
      - ansible
      - ansible-lint
    state: present
  become: true
  when: not is_container | default(false)

# Install full ffmpeg (Ubuntu's universe ffmpeg replaces Fedora's swap dance)
- name: Install ffmpeg and VA-API packages
  ansible.builtin.apt:
    name:
      - ffmpeg
      - libva2
      - vainfo
    state: present
  become: true

# Install OpenH264 codecs and plugins (best-effort: package availability varies by release)
- name: Install OpenH264 codecs and plugins
  ansible.builtin.apt:
    name:
      - gstreamer1.0-libav
      - gstreamer1.0-plugins-bad
      - gstreamer1.0-plugins-ugly
    state: present
  become: true
  failed_when: false

- name: Install fastfetch when available
  ansible.builtin.apt:
    name: fastfetch
    state: present
  become: true
  failed_when: false

# Install molecule via pipx so it gets its own ansible-core in an isolated
# venv. Avoids conflicting with the apt-installed `ansible` package the user
# needed to bootstrap this playbook. Skipped in containers — molecule is a
# workstation testing tool, not needed inside the test target.
- name: Ensure pipx is installed
  ansible.builtin.apt:
    name: pipx
    state: present
  become: true
  when: not is_container | default(false)

- name: Install molecule via pipx
  community.general.pipx:
    name: molecule
    state: install
  become: true
  become_user: "{{ local_user }}"
  when: not is_container | default(false)

- name: Inject molecule-podman driver into the molecule pipx env
  community.general.pipx:
    name: molecule
    state: inject
    inject_packages:
      - molecule-podman
  become: true
  become_user: "{{ local_user }}"
  when: not is_container | default(false)

- name: Ensure pipx PATH is set up for the user
  ansible.builtin.command:
    cmd: pipx ensurepath
  become: true
  become_user: "{{ local_user }}"
  changed_when: false
  when: not is_container | default(false)

# Install podman only if docker is not requested
- name: Install podman if docker is not enabled
  ansible.builtin.apt:
    name: podman
    state: present
  become: true
  when: not install_docker | default(false)

# Install extra fonts. Install one-by-one with failed_when: false so a single
# missing package (e.g. removed/renamed in a newer Ubuntu) doesn't fail the
# whole playbook — fonts are optional cosmetic enhancements.
- name: Install extra fonts (best-effort)
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop:
    - fonts-anonymous-pro
    - fonts-dejavu
    - fonts-dejavu-core
    - fonts-dejavu-extra
    - fonts-freefont-ttf
    - fonts-inconsolata
    - fonts-liberation
    - fonts-liberation2
    - fonts-terminus
  become: true
  failed_when: false

# Optionally install a Nerd Font (FiraCode) for icons (starship, prompts)
- name: Check if FiraCode Nerd Font is already installed
  ansible.builtin.command:
    cmd: fc-list | grep -i "Fira Code"
  register: common_firacode_fonts
  failed_when: false
  changed_when: false
  when: install_nerd_font | default(false)

- name: Download FiraCode Nerd Font zip
  ansible.builtin.get_url:
    url: "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/FiraCode.zip"
    dest: /tmp/FiraCode.zip
    mode: '0644'
    force: true
  when:
    - install_nerd_font | default(false)
    - common_firacode_fonts.rc != 0

- name: Create nerd fonts directory
  ansible.builtin.file:
    path: /usr/local/share/fonts/nerdfonts
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
  when: install_nerd_font | default(false)

- name: Unarchive FiraCode Nerd Font
  ansible.builtin.unarchive:
    src: /tmp/FiraCode.zip
    dest: /usr/local/share/fonts/nerdfonts
    remote_src: true
  become: true
  register: common_firacode_unarchive
  when: install_nerd_font | default(false)

- name: Refresh font cache
  ansible.builtin.command:
    cmd: fc-cache -f -v
  become: true
  when:
    - install_nerd_font | default(false)
    - common_firacode_unarchive.changed | default(false)
  changed_when: true

# Uninstall unwanted apps
- name: Uninstall junk apps
  ansible.builtin.apt:
    name:
      - firefox
      - gnome-calendar
      - gnome-contacts
      - gnome-maps
      - rhythmbox
      - totem
      - gnome-tour
      - gnome-logs
    state: absent
  become: true
  failed_when: false
